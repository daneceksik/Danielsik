<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Stránka nenalezena | Daniel Šik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f172a;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 20px; }
        h1 { font-size: 8rem; margin: 0; color: var(--primary); }
        p { font-size: 1.5rem; margin-bottom: 30px; opacity: 0.8; }
        .btn {
            display: inline-block;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .icon-404 { font-size: 4rem; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-ghost icon-404"></i>
        <h1>404</h1>
        <p>Ups! Tuhle stránku mi asi někdo "usekl" jako ten kód předtím.</p>
        <a href="index.html" class="btn">Zpět na hlavní web</a>
    </div>
</body>
</html>
